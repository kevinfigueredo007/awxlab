---
version: 3

images:
  base_image:
    name: registry.fedoraproject.org/fedora:42

dependencies:
  python_interpreter:
    package_system: python3

  ansible_core:
    package_pip: ansible-core

  ansible_runner:
    package_pip: ansible-runner

  system:
    - openssh-clients
    - sshpass
    - git
    - curl
    - unzip
    - jq

  python:
    - boto3
    - botocore
    - awscli
    - jmespath

  galaxy:
    collections:
      - name: amazon.aws
      - name: community.aws

additional_build_steps:
  prepend_final: |
    RUN dnf install -y ca-certificates && update-ca-trust

    # Instala Session Manager Plugin
    RUN curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm" -o "session-manager-plugin.rpm"
    RUN dnf install -y ./session-manager-plugin.rpm && rm -f session-manager-plugin.rpm

  append_final: |
    # Cria entrypoint para assume role automático
    RUN echo '#!/bin/bash' > /entrypoint.sh
    RUN echo 'set -e' >> /entrypoint.sh
    RUN echo '' >> /entrypoint.sh
    RUN echo 'if [ -n "$ROLE_ARN" ]; then' >> /entrypoint.sh
    RUN echo '  echo "Assumindo role: $ROLE_ARN"' >> /entrypoint.sh
    RUN echo '  CREDS=$(aws sts assume-role --role-arn "$ROLE_ARN" --role-session-name "awx-session")' >> /entrypoint.sh
    RUN echo '  export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r ".Credentials.AccessKeyId")' >> /entrypoint.sh
    RUN echo '  export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r ".Credentials.SecretAccessKey")' >> /entrypoint.sh
    RUN echo '  export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r ".Credentials.SessionToken")' >> /entrypoint.sh
    RUN echo 'fi' >> /entrypoint.sh
    RUN echo '' >> /entrypoint.sh
    RUN echo 'exec "$@"' >> /entrypoint.sh
    RUN chmod +x /entrypoint.sh

options:
  container_init:
    entrypoint: '["/entrypoint.sh"]'