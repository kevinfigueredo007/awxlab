version: 3

images:
  base_image:
    name: registry.fedoraproject.org/fedora:42

dependencies:
  python_interpreter:
    package_system: python3

  ansible_core:
    package_pip: ansible-core

  ansible_runner:
    package_pip: ansible-runner

  system:
    - openssh-clients
    - sshpass
    - git
    - curl
    - unzip

  python:
    - boto3
    - botocore
    - awscli
    - jmespath

  galaxy:
    collections:
      - name: amazon.aws
      - name: community.aws

additional_build_steps:
  prepend_final: |
    RUN dnf install -y ca-certificates && update-ca-trust
    RUN curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm" -o "session-manager-plugin.rpm"
    RUN dnf install -y ./session-manager-plugin.rpm && rm -f session-manager-plugin.rpm