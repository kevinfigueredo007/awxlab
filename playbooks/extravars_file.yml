- name: Debug completo do ambiente do EE
  hosts: localhost
  gather_facts: false

  tasks:

    # =========================
    # EXTRAVARS
    # =========================
    - name: Ler extravars
      ansible.builtin.slurp:
        path: /runner/env/extravars
      register: extravars_file
      ignore_errors: true

    - name: Mostrar extravars
      ansible.builtin.debug:
        msg: "{{ extravars_file.content | b64decode }}"
      when: extravars_file is defined and extravars_file.content is defined

    # =========================
    # ENVVARS (arquivo)
    # =========================
    - name: Ler envvars
      ansible.builtin.slurp:
        path: /runner/env/envvars
      register: envvars_file
      ignore_errors: true

    - name: Mostrar envvars
      ansible.builtin.debug:
        msg: "{{ envvars_file.content | b64decode }}"
      when: envvars_file is defined and envvars_file.content is defined

    # =========================
    # ROLE ARN (seu credential)
    # =========================
    - name: Ver ROLE_ARN
      ansible.builtin.debug:
        msg: "ROLE_ARN = {{ lookup('env', 'ROLE_ARN') | default('NÃO DEFINIDO') }}"

    # =========================
    # AWS ENV VARS (seguro)
    # =========================
    - name: Mostrar variáveis AWS (mascarado)
      ansible.builtin.debug:
        msg:
          AWS_ACCESS_KEY_ID: "{{ lookup('env','AWS_ACCESS_KEY_ID') | default('N/A') }}"
          AWS_SECRET_ACCESS_KEY: >-
            {{ (lookup('env','AWS_SECRET_ACCESS_KEY')[:4] ~ '****')
               if lookup('env','AWS_SECRET_ACCESS_KEY') else 'N/A' }}
          AWS_SESSION_TOKEN: >-
            {{ 'SET' if lookup('env','AWS_SESSION_TOKEN') else 'N/A' }}
          AWS_DEFAULT_REGION: "{{ lookup('env','AWS_DEFAULT_REGION') | default('N/A') }}"

    # =========================
    # VALIDACAO INTELIGENTE
    # =========================
    - name: Validar se tem credencial AWS
      ansible.builtin.debug:
        msg: >-
          {% if lookup('env','AWS_ACCESS_KEY_ID') %}
          ✅ Credencial AWS presente
          {% else %}
          ⚠️ Credencial AWS NÃO encontrada
          {% endif %}

    - name: Validar se tem ROLE_ARN
      ansible.builtin.debug:
        msg: >-
          {% if lookup('env','ROLE_ARN') %}
          ✅ ROLE_ARN detectado (AssumeRole possível)
          {% else %}
          ❌ ROLE_ARN não encontrado
          {% endif %}

    # =========================
    # ENV VARS COMPLETAS (shell)
    # =========================
    - name: Listar env vars (shell)
      ansible.builtin.command: env
      register: all_env

    - name: Mostrar env vars completas
      ansible.builtin.debug:
        var: all_env.stdout_lines